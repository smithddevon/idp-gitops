apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/smithddevon/idp-gitops.git
    targetRevision: main
    path: apps/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true